<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap');

  :root{
    --bg:#FFF0F5;
    --bg-deep:#FFE3EE;
    --card:#FFFFFF;
    --line:#F6CBDC;
    --rose:#E0568B;
    --rose-deep:#C93E76;
    --ink:#7A3B55;
    --ink-soft:#B07E93;
    --mint:#8FD9A8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Gowun Dodum','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 20%, #FFE0EC 0 12%, transparent 13%),
      radial-gradient(circle at 85% 10%, #FFE7F1 0 9%, transparent 10%),
      radial-gradient(circle at 80% 85%, #FFE0EC 0 11%, transparent 12%),
      radial-gradient(circle at 10% 80%, #FFE7F1 0 8%, transparent 9%),
      var(--bg);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
  }
  .app{width:100%;max-width:520px;padding:20px 18px 48px;flex:1}

  /* ── header ─────────────────────────── */
  header{text-align:center;padding:14px 0 6px;position:relative}
  h1{
    font-family:'Gaegu',cursive;font-weight:700;
    font-size:clamp(34px,9vw,44px);letter-spacing:1px;
    color:var(--rose-deep);
    text-shadow:0 2px 0 #FFD3E4;
  }
  h1 .spark{display:inline-block;font-size:.55em;vertical-align:.5em;animation:tw 1.6s ease-in-out infinite}
  h1 .spark:last-child{animation-delay:.8s}
  @keyframes tw{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
  .sub{font-size:13px;color:var(--ink-soft);margin-top:2px}
  .lace-rule{
    height:14px;margin:14px auto 4px;max-width:340px;
    background:radial-gradient(circle at 7px -3px, transparent 0 6px, var(--line) 6px 7.5px, transparent 8px);
    background-size:14px 14px;background-repeat:repeat-x;
  }

  /* ── screens ────────────────────────── */
  .screen{display:none;animation:fadein .35s ease}
  .screen.on{display:block}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .step-label{
    font-family:'Gaegu',cursive;font-size:22px;color:var(--rose-deep);
    text-align:center;margin:14px 0 12px;
  }

  /* frame gallery */
  .gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .frame-card{
    background:var(--card);border:2px solid var(--line);border-radius:22px;
    padding:12px 10px 10px;cursor:pointer;text-align:center;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    position:relative;
  }
  .frame-card:hover{transform:translateY(-3px)}
  .frame-card.sel{
    border-color:var(--rose);
    box-shadow:0 6px 18px rgba(224,86,139,.25);
  }
  .frame-card.sel::after{
    content:'♡';position:absolute;top:-11px;right:-6px;
    background:var(--rose);color:#fff;border-radius:50%;
    width:26px;height:26px;line-height:26px;font-size:14px;
  }
  .thumbwrap{
    background:linear-gradient(#FFF6FA,#FFE9F2);
    border-radius:14px;padding:8px;display:flex;justify-content:center;
  }
  .frame-card img{max-height:190px;width:auto;max-width:100%;filter:drop-shadow(0 2px 4px rgba(201,62,118,.15))}
  .frame-card b{display:block;font-family:'Gaegu',cursive;font-size:18px;margin-top:8px;color:var(--rose-deep)}
  .frame-card span{font-size:11.5px;color:var(--ink-soft)}
  .frame-card .cut{
    position:absolute;top:8px;left:10px;background:#fff;border:1.5px solid var(--line);
    border-radius:999px;font-size:11px;padding:2px 8px;color:var(--rose-deep);
  }

  /* buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Gaegu',cursive;font-size:21px;letter-spacing:.5px;
    border:none;border-radius:999px;cursor:pointer;
    padding:13px 30px;transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
    color:#fff;background:linear-gradient(180deg,var(--rose),var(--rose-deep));
    box-shadow:0 5px 0 #A83262, 0 8px 16px rgba(201,62,118,.28);
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #A83262}
  .btn.ghost{
    color:var(--rose-deep);background:#fff;border:2px solid var(--line);
    box-shadow:0 4px 0 #F0C1D5;
  }
  .btn.ghost:active{transform:translateY(3px);box-shadow:0 1px 0 #F0C1D5}
  .btn:disabled{opacity:.45;pointer-events:none}
  .btn-row{display:flex;gap:12px;justify-content:center;margin-top:22px;flex-wrap:wrap}

  /* ── capture ────────────────────────── */
  .cam-stage{
    position:relative;border-radius:26px;overflow:hidden;
    border:3px solid var(--line);background:#2b2027;
    aspect-ratio:3/4;max-height:62dvh;margin:0 auto;
    box-shadow:0 10px 26px rgba(201,62,118,.18);
  }
  .cam-stage video,.cam-stage canvas.preview{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .cam-stage video{transform:scaleX(-1)}
  .cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  .cam-flash.go{animation:flash .35s ease}
  @keyframes flash{0%{opacity:.9}100%{opacity:0}}
  .cam-off{
    position:absolute;inset:0;display:flex;flex-direction:column;gap:10px;
    align-items:center;justify-content:center;color:#FFD3E4;
    font-family:'Gaegu',cursive;font-size:22px;text-align:center;padding:20px;
  }
  .cam-off .cam-emoji{font-size:44px}
  .shots{display:flex;gap:8px;justify-content:center;margin:14px 0 4px}
  .dot{
    width:38px;height:38px;border-radius:12px;border:2px dashed var(--line);
    background:#fff;display:flex;align-items:center;justify-content:center;
    font-size:13px;color:var(--ink-soft);overflow:hidden;
  }
  .dot img{width:100%;height:100%;object-fit:cover}
  .dot.now{border-style:solid;border-color:var(--rose)}
  .cam-hint{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:8px}

  /* ── result ─────────────────────────── */
  .result-wrap{
    display:flex;justify-content:center;margin-top:6px;
  }
  .result-wrap canvas{
    max-width:min(78vw,320px);width:100%;height:auto;border-radius:14px;
    box-shadow:0 14px 34px rgba(201,62,118,.28), 0 3px 8px rgba(201,62,118,.15);
    background:#fff;
  }
  .making{
    text-align:center;font-family:'Gaegu',cursive;font-size:22px;
    color:var(--rose-deep);padding:60px 0;
  }
  .heartbeat{display:inline-block;animation:hb 1s ease-in-out infinite;font-size:34px}
  @keyframes hb{0%,100%{transform:scale(1)}30%{transform:scale(1.25)}}

  footer{font-size:11px;color:#D3A5BA;text-align:center;padding:10px 0 22px}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span class="spark">✦</span> 공주네컷 <span class="spark">✦</span></h1>
    <div class="sub">프레임 고르고, 찰칵 — 나만의 스티커 사진</div>
    <div class="lace-rule"></div>
  </header>

  <!-- 1. 시작 화면 -->
  <section id="scr-start" class="screen on">
    <div class="step-label">1. 프레임을 골라주세요 ♡</div>
    <div class="gallery" id="gallery"></div>
    <div class="btn-row">
      <button class="btn ghost" id="btn-upload" disabled>🖼 사진 첨부</button>
      <button class="btn" id="btn-shoot" disabled>📸 촬영하기</button>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple hidden>
  </section>

  <!-- 2. 촬영 화면 -->
  <section id="scr-cam" class="screen">
    <div class="step-label" id="cam-title">2. 촬영</div>
    <div class="shots" id="shots"></div>
    <div class="cam-stage" id="cam-stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas class="preview" id="shot-preview" hidden></canvas>
      <div class="cam-off" id="cam-off">
        <div class="cam-emoji">📸</div>
        <div>START 버튼을 누르면<br>카메라가 켜져요</div>
      </div>
      <div class="cam-flash" id="flash"></div>
    </div>
    <div class="cam-hint" id="cam-hint"></div>
    <div class="btn-row" id="cam-controls">
      <button class="btn" id="btn-start">촬영 START ♡</button>
      <button class="btn ghost" id="btn-back-1">← 프레임 다시 고르기</button>
    </div>
  </section>

  <!-- 3. 결과 화면 -->
  <section id="scr-result" class="screen">
    <div class="step-label">3. 완성! 공주님의 네컷 ♡</div>
    <div class="making" id="making"><span class="heartbeat">💗</span><br>사진을 예쁘게 붙이는 중...</div>
    <div class="result-wrap"><canvas id="result" hidden></canvas></div>
    <div class="btn-row">
      <button class="btn" id="btn-save">💾 Save</button>
      <button class="btn ghost" id="btn-retake">↺ Retake</button>
      <button class="btn ghost" id="btn-home">🏠 처음으로</button>
    </div>
  </section>

  <footer>princess 4-cut photobooth · 사진은 기기 밖으로 전송되지 않아요</footer>
</div>

672, "slots": [[250, 160, 392, 523], [275, 969, 379, 506]], "title": "폰꾸 2컷", "desc": "곰돌이 키링 폰 2컷"}};

/* ── state ── */
let selKey = null;      // selected frame key
let photos = [];        // captured/uploaded Image objects (in slot order)
let shotIdx = 0;        // current shot number
let stream = null;
let mode = null;        // 'camera' | 'upload'
const frameImgs = {};   // decoded frame Image cache

const $ = id => document.getElementById(id);
const screens = {start:$('scr-start'), cam:$('scr-cam'), result:$('scr-result')};
function show(name){
  Object.values(screens).forEach(s=>s.classList.remove('on'));
  screens[name].classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── 1. gallery ── */
const gallery = $('gallery');
for(const [key,f] of Object.entries(FRAMES)){
  const card = document.createElement('div');
  card.className='frame-card';
  card.innerHTML = `
    <span class="cut">${f.slots.length}컷</span>
    <div class="thumbwrap"><img src="${f.src}" alt="${f.title} 프레임"></div>
    <b>${f.title}</b><span>${f.desc}</span>`;
  card.onclick = ()=>{
    document.querySelectorAll('.frame-card').forEach(c=>c.classList.remove('sel'));
    card.classList.add('sel');
    selKey = key;
    $('btn-upload').disabled = $('btn-shoot').disabled = false;
    mixpanel.track('Frame Selected', {frame: key, title: f.title});
  };
  gallery.appendChild(card);
}

/* ── frame image cache ── */
function getFrameImg(key){
  return new Promise(res=>{
    if(frameImgs[key]) return res(frameImgs[key]);
    const im = new Image();
    im.onload = ()=>{frameImgs[key]=im; res(im);};
    im.src = FRAMES[key].src;
  });
}

/* ── upload flow ── */
$('btn-upload').onclick = ()=>{ mixpanel.track('Upload Photos Click', {frame: selKey}); $('file-input').click(); };
$('file-input').onchange = async e=>{
  const need = FRAMES[selKey].slots.length;
  const files = [...e.target.files].slice(0, need);
  if(files.length === 0) return;
  if(files.length < need){
    alert(`이 프레임은 사진이 ${need}장 필요해요! (지금 ${files.length}장)\n${need}장을 골라주세요 ♡`);
    e.target.value=''; return;
  }
  photos = await Promise.all(files.map(f=>new Promise(res=>{
    const im = new Image();
    im.onload = ()=>res(im);
    im.src = URL.createObjectURL(f);
  })));
  photos.forEach(p=>p._mirror=false);
  mode='upload';
  e.target.value='';
  goResult();
};

/* ── camera flow ── */
const video=$('video'), off=$('cam-off'), prevCv=$('shot-preview');
const controls=$('cam-controls');

$('btn-shoot').onclick = ()=>{
  mixpanel.track('Shoot Flow Start Click', {frame: selKey});
  mode='camera'; photos=[]; shotIdx=0;
  buildDots(); setCamUI('idle');
  $('cam-title').textContent = `2. 촬영 — ${FRAMES[selKey].title}`;
  show('cam');
};

function buildDots(){
  const n = FRAMES[selKey].slots.length;
  $('shots').innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===shotIdx?' now':'');
    if(photos[i]){const im=document.createElement('img');im.src=photos[i]._thumb;d.appendChild(im);}
    else d.textContent=i+1;
    $('shots').appendChild(d);
  }
}

function setCamUI(state){
  // state: idle | live | review
  const n = FRAMES[selKey].slots.length;
  off.style.display = state==='idle' ? 'flex':'none';
  video.hidden = state!=='live';
  prevCv.hidden = state!=='review';
  const hint=$('cam-hint');
  if(state==='idle'){
    controls.innerHTML='';
    controls.append(mkBtn('촬영 START ♡','', startCamera));
    controls.append(mkBtn('← 프레임 다시 고르기','ghost', backToStart));
    hint.textContent = `${n}장을 한 장씩 찍어서 세로 스티커 사진을 만들어요`;
  }else if(state==='live'){
    controls.innerHTML='';
    controls.append(mkBtn(`찰칵! (${shotIdx+1} / ${n})`,'', capture));
    controls.append(mkBtn('그만두기','ghost', backToStart));
    hint.textContent='준비되면 찰칵 버튼을 눌러주세요 ♡';
  }else{
    controls.innerHTML='';
    controls.append(mkBtn('이 사진 사용하기 ♡','', keepShot));
    controls.append(mkBtn('다시 찍기','ghost', ()=>{ mixpanel.track('Retake Shot Click', {frame: selKey, shotIndex: shotIdx}); setCamUI('live'); }));
    hint.textContent='마음에 들면 사용하기, 아니면 다시 찍기!';
  }
}
function mkBtn(txt,cls,fn){
  const b=document.createElement('button');
  b.className='btn '+cls; b.textContent=txt; b.onclick=fn; return b;
}

async function startCamera(){
  mixpanel.track('Camera Start Click', {frame: selKey});
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user', width:{ideal:1280}, height:{ideal:1280}}, audio:false
    });
    video.srcObject = stream;
    await video.play();
    setCamUI('live');
  }catch(err){
    alert('카메라를 켤 수 없어요 🥲\n브라우저 카메라 권한을 확인해 주세요.\n(또는 "사진 첨부"로 만들 수 있어요)');
  }
}

function capture(){
  mixpanel.track('Shutter Click', {frame: selKey, shotIndex: shotIdx});
  const f=$('flash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
  const vw=video.videoWidth, vh=video.videoHeight;
  prevCv.width=vw; prevCv.height=vh;
  const ctx=prevCv.getContext('2d');
  ctx.translate(vw,0); ctx.scale(-1,1);      // mirror like the preview
  ctx.drawImage(video,0,0);
  setCamUI('review');
}

function keepShot(){
  mixpanel.track('Keep Shot Click', {frame: selKey, shotIndex: shotIdx});
  const im=new Image();
  im.onload=()=>{
    im._mirror=false;                        // already mirrored at capture
    im._thumb=prevCv.toDataURL('image/jpeg',.5);
    photos[shotIdx]=im;
    shotIdx++;
    const n=FRAMES[selKey].slots.length;
    if(shotIdx>=n){ stopCam(); goResult(); }
    else{ buildDots(); setCamUI('live'); }
  };
  im.src=prevCv.toDataURL('image/png');
}

function stopCam(){
  if(stream){stream.getTracks().forEach(t=>t.stop()); stream=null;}
  video.srcObject=null;
}
function backToStart(){ mixpanel.track('Back To Start Click', {frame: selKey}); stopCam(); show('start'); }

/* ── 3. result composite ── */
async function goResult(){
  show('result');
  $('making').style.display='block';
  $('result').hidden=true;
  const f = FRAMES[selKey];
  const frameImg = await getFrameImg(selKey);
  const cv=$('result');
  cv.width=f.w; cv.height=f.h;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,f.w,f.h);

  f.slots.forEach((s,i)=>{
    const p=photos[i]; if(!p) return;
    const [x,y,w,h]=s;
    // cover fit
    const scale=Math.max(w/p.naturalWidth, h/p.naturalHeight);
    const dw=p.naturalWidth*scale, dh=p.naturalHeight*scale;
    ctx.save();
    ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
    ctx.drawImage(p, x+(w-dw)/2, y+(h-dh)/2, dw, dh);
    ctx.restore();
  });
  ctx.drawImage(frameImg,0,0,f.w,f.h);

  $('making').style.display='none';
  cv.hidden=false;
}

$('btn-save').onclick=()=>{
  mixpanel.track('Save Click', {frame: selKey, mode});
  const a=document.createElement('a');
  const t=new Date(), pad=n=>String(n).padStart(2,'0');
  a.download=`공주네컷_${t.getFullYear()}${pad(t.getMonth()+1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}.png`;
  a.href=$('result').toDataURL('image/png');
  a.click();
};

$('btn-retake').onclick=()=>{
  mixpanel.track('Result Retake Click', {frame: selKey, mode});
  photos=[]; shotIdx=0;
  if(mode==='camera'){ buildDots(); setCamUI('idle'); show('cam'); }
  else{ $('file-input').click(); show('start'); }
};

$('btn-home').onclick=()=>{ mixpanel.track('Home Click', {frame: selKey}); photos=[]; shotIdx=0; stopCam(); show('start'); };
</script>
